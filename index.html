<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aayush Gund | Official Portfolio</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); z-index: -1; }
        
        /* Hero Section Animations */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; animation: fadeInUp 1.5s ease; }
        h1 { font-size: 4rem; margin: 0; background: linear-gradient(90deg, #00ffcc, #3399ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { font-size: 1.5rem; color: #888; margin: 10px 0; letter-spacing: 2px; }

        /* Stats & Buttons */
        .stats { display: flex; gap: 20px; margin: 30px 0; flex-wrap: wrap; justify-content: center; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border: 1px solid #222; min-width: 120px; transition: 0.3s; }
        .stat-card:hover { border-color: #00ffcc; transform: translateY(-5px); }
        .btn-launch { padding: 18px 40px; background: #00ffcc; color: #000; text-decoration: none; font-weight: bold; border-radius: 50px; box-shadow: 0 0 20px rgba(0,255,204,0.4); transition: 0.3s; }
        .btn-launch:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(0,255,204,0.6); }

        /* Screenshot Gallery */
        .gallery { padding: 80px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
        .screenshot { width: 100%; border-radius: 20px; border: 1px solid #333; transition: 0.5s; cursor: pointer; }
        .screenshot:hover { transform: scale(1.05) rotate(1deg); border-color: #00ffcc; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="hero">
        <p class="sub">INDEPENDENT DEVELOPER</p>
        <h1>Aayush Gund</h1>
        <p style="color:#00ffcc; font-weight:bold;">FROM INDIA 🇮🇳</p>
        
        <div class="stats">
            <div class="stat-card"><h2 style="margin:0;">23K+</h2><p style="margin:0; font-size:0.8rem;">YouTube Views</p></div>
            <div class="stat-card"><h2 style="margin:0;">AI</h2><p style="margin:0; font-size:0.8rem;">Architect</p></div>
            <div class="stat-card"><h2 style="margin:0;">#1</h2><p style="margin:0; font-size:0.8rem;">Google Rank</p></div>
        </div>

        <a href="https://aayushgund2-bit.github.io" class="btn-launch" target="_blank">LAUNCH AI UNIVERSE 🚀</a>
    </div>

    <h2 style="text-align:center; font-size:2rem; margin-top:50px;">Ecosystem Showcase</h2>
        <div class="gallery">
        <img src="Screenshot_20260303_143419.jpg" class="screenshot" alt="Booting Screen">
        <img src="Screenshot_20260303_143424.jpg" class="screenshot" alt="Study Mode">
        <img src="Screenshot_20260303_143429.jpg" class="screenshot" alt="Fun Mode">
        <img src="Screenshot_20260303_143435.jpg" class="screenshot" alt="Motivation Mode">
        <img src="Screenshot_20260303_143459.jpg" class="screenshot" alt="Chat Mode">
        <img src="Screenshot_20260303_143613.jpg" class="screenshot" alt="Roast Me">
        <img src="Screenshot_20260303_143657.jpg" class="screenshot" alt="Motivation Advice">
        </div>
    

    <footer style="text-align:center; padding: 50px; color: #444; border-top: 1px solid #111;">
        <p>Aayush Gund | Class 10 Student & Tech Innovator</p>
        <p style="font-size:0.8rem;">Built with Passion in India 🇮🇳</p>
    </footer>
</body>
  </html>
